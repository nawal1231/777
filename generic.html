		// Generate and insert 90,000 'why' tokens (space-separated) into the page
		document.addEventListener('DOMContentLoaded', function () {

			// Build in chunks to avoid huge intermediate arrays why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why why
			var parts = [];
			var blockSize = 1000;
			var block = new Array(blockSize).fill(chunk).join(' ');
			for (var i = 0; i < Math.floor(count / blockSize); i++) parts.push(block);
			var rem = count % blockSize;
			if (rem) parts.push(new Array(rem).fill(chunk).join(' '));
			strong.textContent = parts.join(' ');
